<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapSpy.ai - Painel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0f0d;
            --bg-card: #111b21;
            --bg-input: #1f2c33;
            --green: #25d366;
            --green-dark: #128c7e;
            --red: #ef4444;
            --orange: #f59e0b;
            --text: #e9edef;
            --text-muted: #8696a0;
            --border: #2a3942;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Login Screen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo h1 {
            color: var(--green);
            font-size: 28px;
            font-weight: 700;
        }
        
        .login-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: var(--green);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .dashboard.active {
            display: block;
        }
        
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-logo h1 {
            color: var(--green);
            font-size: 22px;
        }
        
        .header-logo span {
            background: var(--green);
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-secondary {
            padding: 10px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            border-color: var(--green);
            color: var(--green);
        }
        
        .main {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }
        
        .stat-card h3 {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
        }
        
        .stat-card .value.green {
            color: var(--green);
        }
        
        .stat-card .change {
            font-size: 13px;
            color: var(--green);
            margin-top: 8px;
        }
        
        /* Leads Table */
        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .table-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .table-actions {
            display: flex;
            gap: 12px;
        }
        
        .search-input {
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            width: 250px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--green);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        th {
            background: var(--bg-input);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        
        td {
            font-size: 14px;
        }
        
        tr:hover {
            background: rgba(37, 211, 102, 0.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-new {
            background: rgba(37, 211, 102, 0.15);
            color: var(--green);
        }
        
        .status-contacted {
            background: rgba(245, 158, 11, 0.15);
            color: var(--orange);
        }
        
        .status-converted {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
        
        .status-lost {
            background: rgba(239, 68, 68, 0.15);
            color: var(--red);
        }
        
        .action-btn {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            margin-right: 6px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            border-color: var(--green);
            color: var(--green);
        }
        
        .action-btn.delete:hover {
            border-color: var(--red);
            color: var(--red);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        
        .pagination-info {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .pagination-buttons {
            display: flex;
            gap: 8px;
        }
        
        .page-btn {
            padding: 8px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
        }
        
        .page-btn:hover:not(:disabled) {
            border-color: var(--green);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-btn.active {
            background: var(--green);
            border-color: var(--green);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state svg {
            width: 60px;
            height: 60px;
            color: var(--border);
            margin-bottom: 16px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
        }
        
        .modal h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 16px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .table-header {
                flex-direction: column;
                gap: 12px;
            }
            
            .search-input {
                width: 100%;
            }
            
            th, td {
                padding: 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">
                <h1>🔒 ZapSpy.ai</h1>
                <p>Painel Administrativo</p>
            </div>
            
            <div class="error-msg" id="loginError"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="admin@zapspy.ai">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <div class="header-logo">
                <h1>📊 ZapSpy.ai</h1>
                <span>ADMIN</span>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="exportLeads()">📥 Exportar CSV</button>
                <button class="btn-secondary" onclick="refreshData()">🔄 Atualizar</button>
                <button class="btn-secondary" onclick="logout()">🚪 Sair</button>
            </div>
        </header>
        
        <main class="main">
            <!-- Estatísticas -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Total de Leads</h3>
                    <div class="value" id="statTotal">-</div>
                </div>
                <div class="stat-card">
                    <h3>Hoje</h3>
                    <div class="value green" id="statToday">-</div>
                </div>
                <div class="stat-card">
                    <h3>Esta Semana</h3>
                    <div class="value" id="statWeek">-</div>
                </div>
                <div class="stat-card">
                    <h3>Taxa de Conversão</h3>
                    <div class="value" id="statConversion">-</div>
                </div>
            </div>
            
            <!-- Tabela de Leads -->
            <div class="table-container">
                <div class="table-header">
                    <h2>📋 Leads</h2>
                    <div class="table-actions">
                        <input type="text" class="search-input" id="searchInput" placeholder="Buscar por email, telefone...">
                        <select class="btn-secondary" id="statusFilter">
                            <option value="">Todos os Status</option>
                            <option value="new">Novo</option>
                            <option value="contacted">Contatado</option>
                            <option value="converted">Convertido</option>
                            <option value="lost">Perdido</option>
                        </select>
                    </div>
                </div>
                
                <div id="leadsTableBody">
                    <div class="loading">Carregando leads...</div>
                </div>
                
                <div class="pagination" id="pagination">
                    <div class="pagination-info" id="paginationInfo">Mostrando 0 de 0</div>
                    <div class="pagination-buttons" id="paginationButtons"></div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal de Edição -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>Editar Lead</h3>
            <input type="hidden" id="editLeadId">
            <div class="form-group">
                <label>Status</label>
                <select id="editStatus" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px;">
                    <option value="new">Novo</option>
                    <option value="contacted">Contatado</option>
                    <option value="converted">Convertido</option>
                    <option value="lost">Perdido</option>
                </select>
            </div>
            <div class="form-group">
                <label>Observações</label>
                <textarea id="editNotes" rows="4" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; resize: vertical;" placeholder="Adicione observações sobre este lead..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="saveLeadEdit()">Salvar Alterações</button>
                <button class="btn-secondary" onclick="closeEditModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let authToken = localStorage.getItem('adminToken');
        let currentPage = 1;
        let searchTimeout;
        
        // Mapeamento de status para português
        const statusLabels = {
            'new': 'Novo',
            'contacted': 'Contatado',
            'converted': 'Convertido',
            'lost': 'Perdido'
        };
        
        // Verificar se está logado
        if (authToken) {
            showDashboard();
        }
        
        // Formulário de login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            try {
                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('adminToken', authToken);
                    showDashboard();
                } else {
                    errorEl.textContent = data.error === 'Invalid credentials' ? 'Credenciais inválidas' : (data.error || 'Falha no login');
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Erro de conexão. Tente novamente.';
                errorEl.style.display = 'block';
            }
        });
        
        // Mostrar dashboard
        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            loadStats();
            loadLeads();
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('adminToken');
            authToken = null;
            location.reload();
        }
        
        // Carregar estatísticas
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                
                document.getElementById('statTotal').textContent = data.total.toLocaleString('pt-BR');
                document.getElementById('statToday').textContent = data.today.toLocaleString('pt-BR');
                document.getElementById('statWeek').textContent = data.thisWeek.toLocaleString('pt-BR');
                
                // Calcular taxa de conversão
                const converted = data.byStatus?.find(s => s.status === 'converted')?.count || 0;
                const rate = data.total > 0 ? ((converted / data.total) * 100).toFixed(1) : 0;
                document.getElementById('statConversion').textContent = rate + '%';
                
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }
        
        // Carregar leads
        async function loadLeads(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            
            try {
                const params = new URLSearchParams({ page, limit: 20 });
                if (search) params.append('search', search);
                if (status) params.append('status', status);
                
                const response = await fetch(`${API_URL}/api/admin/leads?${params}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                renderLeads(data.leads, data.pagination);
                
            } catch (error) {
                console.error('Erro ao carregar leads:', error);
                document.getElementById('leadsTableBody').innerHTML = '<div class="loading">Erro ao carregar leads</div>';
            }
        }
        
        // Renderizar tabela de leads
        function renderLeads(leads, pagination) {
            const container = document.getElementById('leadsTableBody');
            
            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <p>Nenhum lead encontrado</p>
                    </div>
                `;
                return;
            }
            
            const table = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>WhatsApp</th>
                            <th>Alvo</th>
                            <th>Status</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${leads.map(lead => `
                            <tr>
                                <td>#${lead.id}</td>
                                <td>${escapeHtml(lead.email)}</td>
                                <td>${escapeHtml(lead.whatsapp)}</td>
                                <td>${lead.target_phone ? escapeHtml(lead.target_phone) : '-'}</td>
                                <td><span class="status-badge status-${lead.status || 'new'}">${statusLabels[lead.status] || 'Novo'}</span></td>
                                <td>${formatDate(lead.created_at)}</td>
                                <td>
                                    <button class="action-btn" onclick="editLead(${lead.id}, '${lead.status || 'new'}', '${escapeHtml(lead.notes || '')}')" title="Editar">✏️</button>
                                    <button class="action-btn delete" onclick="deleteLead(${lead.id})" title="Excluir">🗑️</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            container.innerHTML = table;
            
            // Atualizar paginação
            document.getElementById('paginationInfo').textContent = 
                `Mostrando ${(pagination.page - 1) * pagination.limit + 1}-${Math.min(pagination.page * pagination.limit, pagination.total)} de ${pagination.total}`;
            
            const buttonsHtml = [];
            for (let i = 1; i <= pagination.totalPages; i++) {
                buttonsHtml.push(`<button class="page-btn ${i === pagination.page ? 'active' : ''}" onclick="loadLeads(${i})">${i}</button>`);
            }
            document.getElementById('paginationButtons').innerHTML = buttonsHtml.slice(0, 10).join('');
        }
        
        // Editar lead
        function editLead(id, status, notes) {
            document.getElementById('editLeadId').value = id;
            document.getElementById('editStatus').value = status;
            document.getElementById('editNotes').value = notes;
            document.getElementById('editModal').classList.add('active');
        }
        
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }
        
        async function saveLeadEdit() {
            const id = document.getElementById('editLeadId').value;
            const status = document.getElementById('editStatus').value;
            const notes = document.getElementById('editNotes').value;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/leads/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ status, notes })
                });
                
                if (response.ok) {
                    closeEditModal();
                    loadLeads(currentPage);
                    loadStats();
                }
            } catch (error) {
                console.error('Erro ao atualizar lead:', error);
            }
        }
        
        // Excluir lead
        async function deleteLead(id) {
            if (!confirm('Tem certeza que deseja excluir este lead?')) return;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/leads/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (response.ok) {
                    loadLeads(currentPage);
                    loadStats();
                }
            } catch (error) {
                console.error('Erro ao excluir lead:', error);
            }
        }
        
        // Exportar leads
        function exportLeads() {
            window.open(`${API_URL}/api/admin/leads/export?token=${authToken}`, '_blank');
        }
        
        // Atualizar dados
        function refreshData() {
            loadStats();
            loadLeads(currentPage);
        }
        
        // Busca com debounce
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => loadLeads(1), 500);
        });
        
        document.getElementById('statusFilter').addEventListener('change', () => loadLeads(1));
        
        // Helpers
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
